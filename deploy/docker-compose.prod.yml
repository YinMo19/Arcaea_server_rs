services:
  caddy:
    environment:
      BACKEND_UPSTREAM: app:8090
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN in deploy/.env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in deploy/.env}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.${CADDY_TLS_MODE:-https}:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
